name: Deploy AI Service to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/ai-service/**"
      - ".github/workflows/deploy-ai-service.yml"

env:
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: sintia-ai-service
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/ai-service

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        working-directory: apps/ai-service
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 1Gi \
            --cpu 1 \
            --no-cpu-throttling \
            --timeout 3600 \
            --set-secrets \
              "DATABASE_URL=sintia-database-url:latest,\
              OPENAI_API_KEY=sintia-openai-key:latest,\
              SERVICE_API_KEY=sintia-service-api-key:latest,\
              WEBHOOK_SECRET=sintia-webhook-secret:latest,\
              SUPABASE_URL=sintia-supabase-url:latest,\
              SUPABASE_SERVICE_ROLE_KEY=sintia-supabase-service-role-key:latest" \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO"

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "Service URL: $URL"
          echo "Health: $URL/health"
